# vibe-halt active track portfolio.
# Lean import of the dharma_swarm governance model: 1..N co-equal tracks,
# WIP-limited, surface-owned, each serving a spine objective.
# `make onboard` renders this; never answer runtime questions from prose.

version: 1
wip_warn: 2
wip_max: 3

# Surfaces every track may touch under an append-only protocol; the
# onboard ownership-overlap gate ignores these.
shared_surfaces:
  - Cargo.toml
  - Cargo.lock
  - docs/governance/ACTIVE_TRACK.yaml
  - scripts/check_determinism_denylist.py
  - corpus/PLAYBOOK.md
  # The single gate implementation (make gate AND CI): every track
  # appends its anchored gates here — shared under the append-only
  # protocol (registered 2026-07-22, convergence C5 review finding).
  - scripts/gate.sh

spine_objectives:
  - id: deterministic-truth
    summary: >
      Every verdict vibe-halt emits is mechanically reproducible: same seed,
      same trace hash, same finding — or the rig says loudly that it is not.
  - id: real-bugs-found
    summary: >
      The rig earns its keep by finding real defects in real (vibe-coded)
      code, with one-command repros, not by passing its own demos.

tracks:
