      - "D2: Tier-1 deterministic ddmin fault-plan shrinker with synthetic-oracle tests"
      - "D3: independent verify workflow runs the battery and a 200-replay soak"
      - "D4: root AGENTS.md remains a thin pointer to the governance SSOT"
    next:
