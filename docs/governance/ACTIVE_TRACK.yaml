      # Mirrors docs/plans/VIBE_HALT_BUILD_PLAN_2026-07-20.md § Success.
      - "Tier 1: same seed => bit-identical trace hash across 1000 runs and two machines"
      - "Tier 2: divergence rate measured and published, never hidden (<5% target on reference workloads)"
      - ">=80% recall on a seeded vibe-bug corpus of >=25 real bugs"
      - ">=3 previously unknown, human-confirmed bugs in real code"
      - "every failure ships a one-command deterministic repro; median shrink >=90% events removed"
      - ">=1000 Tier-1 universes/hour/reference-workload on the build box"
      - "one end-to-end dharma_swarm receipt via a VibeHaltSandbox adapter"
    next:
      - "RESUMED 2026-07-22 after Track 2 closeout: close issue #24's audit truth gaps, deliver child-visible cassette-backed Tier-2/D2 reach, and preserve every open channel as D2/UNCHECKED"
      - "implement only the safe C1-C6 and CD packages admitted by docs/prompts/VIBE_HALT_POST_AUDIT_TIER2_REACH_LONG_RUNNING_GOAL_2026-07-22.md; verifier-owned surfaces still require an interface request"
      - "core package split: C1 observation identity; C2-core oracle and gate truth; C3 evidence v2 and safe digest; C4 sandbox truth envelope; C5 cassette transport; C6 measured D2 reach; CD doctrine and observation documentation"
      - "prepare a docs-only C7 decision packet for the capped Linux supervisor spike only after safe foundations merge; no helper implementation begins without separate human ratification"
