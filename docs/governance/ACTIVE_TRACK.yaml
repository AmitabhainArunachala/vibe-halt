  - id: vibe-bug-corpus-2026-07
    title: "vibe-bug corpus — seeded real-bug classes with pinned recall gates"
    status: ACTIVE
    serves: real-bugs-found
    opened: 2026-07-21
    # Surfaces: the corpus artifacts only. The seeded-bug WORKLOADS live
    # under crates/vh-cli (owned by vibe-halt-core-2026-07); this track
