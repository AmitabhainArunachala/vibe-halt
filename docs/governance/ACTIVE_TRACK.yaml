# vibe-halt active track portfolio.
# Lean import of the dharma_swarm governance model: 1..N co-equal tracks,
# WIP-limited, surface-owned, each serving a spine objective.
# `make onboard` renders this; never answer runtime questions from prose.

version: 1
wip_warn: 2
wip_max: 3

# Surfaces every track may touch under an append-only protocol; the
# onboard ownership-overlap gate ignores these.
shared_surfaces:
  - Cargo.toml
  - Cargo.lock
  - docs/governance/ACTIVE_TRACK.yaml
  - scripts/check_determinism_denylist.py

spine_objectives:
  - id: deterministic-truth
    summary: >
      Every verdict vibe-halt emits is mechanically reproducible: same seed,
      same trace hash, same finding — or the rig says loudly that it is not.
  - id: real-bugs-found
    summary: >
      The rig earns its keep by finding real defects in real (vibe-coded)
      code, with one-command repros, not by passing its own demos.

tracks:
  - id: vibe-halt-core-2026-07
    title: "vibe-halt core — deterministic multiverse engine (Phases 0-4)"
    status: ACTIVE
    serves: deterministic-truth
    opened: 2026-07-20
    # Narrowed 2026-07-20 (hardening-loop GAP): exact surfaces, no broad
    # globs that swallow sibling tracks' crates and workflows.
    owned_surfaces:
      - rust-toolchain.toml
      - crates/vh-core/**
      - crates/vh-trace/**
      - crates/vh-gremlin/**
      - crates/vh-props/**
      - crates/vh-multiverse/**
      - crates/vh-cli/**
      - clients/**
      - scripts/onboard.py
      - scripts/check_determinism_denylist.py
      - docs/specs/**
      - docs/plans/**
      - docs/prompts/**
      - Makefile
      - .github/workflows/ci.yml
      - CLAUDE.md
      - README.md
    acceptance:
      # Mirrors docs/plans/VIBE_HALT_BUILD_PLAN_2026-07-20.md § Success.
      - "Tier 1: same seed => bit-identical trace hash across 1000 runs and two machines"
      - "Tier 2: divergence rate measured and published, never hidden (<5% target on reference workloads)"
      - ">=80% recall on a seeded vibe-bug corpus of >=25 real bugs"
      - ">=3 previously unknown, human-confirmed bugs in real code"
      - "every failure ships a one-command deterministic repro; median shrink >=90% events removed"
      - ">=1000 Tier-1 universes/hour/reference-workload on the build box"
      - "one end-to-end dharma_swarm receipt via a VibeHaltSandbox adapter"
    next:
      - "Phase 0 (wk 1-2): trace format freeze, seed-tree hardening, divergence gate in CI (DONE at scaffold)"
      - "Phase 1 (wk 3-5): Tier-1 sim runtime (net/disk/process gremlins on the scheduler); Tier-2 hermetic subprocess sandbox + LLM cassette layer"
      - "Phase 2 (wk 6-8): end-state oracles, fault-plan shrinker, vibe-bug corpus >=25"
      - "Phase 3 (wk 9-10): parallel fan-out matching sequential hashes; bandit seed scheduling; failure fingerprint dedup"
      - "Phase 4 (wk 11-12): gRPC surface, Python client, dharma_swarm gate adapter, live-fire demo"
    non_goals:
      - "Tier 3 (deterministic hypervisor) — out of scope for the 12-week build; trace/oracle layer stays substrate-agnostic so a backend can slot in later"
      - "replacing dharma_swarm governance — this repo imports the lean subset only"

  - id: vibe-bug-corpus-2026-07
    title: "vibe-bug corpus — seeded real-bug classes with pinned recall gates"
    status: ACTIVE
    serves: real-bugs-found
    opened: 2026-07-21
    # Surfaces: the corpus artifacts only. The seeded-bug WORKLOADS live
    # under crates/vh-cli (owned by vibe-halt-core-2026-07); this track
    # owns the entry schema, the harvesting playbook, and the entries
    # that bind each bug to its pinned recall command.
    owned_surfaces:
      - corpus/**
    acceptance:
      - ">=25 corpus entries harvested from real (AI-generated) code by end of Phase 2"
      - ">=80% recall within each entry's pinned universe budget (build-plan Success criterion 3)"
      - "every entry carries a one-command deterministic repro (vh run --workload ... --seed ... --universe K)"
      - "recall gates for every seeded entry run in scripts/gate.sh with exact exits and anchored verdicts"
    next:
      - "seed the corpus with the five Phase-1 bug classes (lost update, retry double-apply, dirty read, crash-window TOCTOU, fsync-lie hole)"
      - "harvest real vibe-coded bugs from public AI-generated PRs per the playbook"
    non_goals:
      - "no real-code live-fire in this track before Phase 4 (build plan owns that)"
      - "no entry without a pinned recall gate — an unfindable bug is not a corpus entry"
      - "no third active track beyond this portfolio without operator lifecycle authorization"

  - id: vibe-halt-verifier-2026-07
    title: "vibe-halt verifier — independent replay, shrink, and publication evidence"
    status: ACTIVE
    serves: deterministic-truth
    opened: 2026-07-20
    owned_surfaces:
      - AGENTS.md
      - crates/vh-shrink/**
      - crates/vh-verify/**
      - .github/workflows/verify.yml
    acceptance:
      - "make onboard runs before verifier work and bash scripts/gate.sh is the only claimed gate battery"
      - "Tier-1 complete-observable projection destructures UniverseObservation without a rest pattern and carries a verifier-owned versioned fingerprint"
      - "shrunk corpus reproducers bind source/build, workload, seed/universe, oracle identity, and captured failure fingerprint in a publication manifest"
      - "cross-machine doctor and verifier receipts match on the exact PR head"
      - "hardening-loop-5 findings are reproduced from an isolated checkout and posted without modifying core-owned surfaces"
    next:
      - "rebase PR #2 on the current Track-1 tip and publish exact-SHA receipts"
      - "maintain the independent runtime edge, lifecycle, and corpus-shrink battery"
    non_goals:
      - "no edits to core, trace, gremlin, props, multiverse, cli, corpus, scripts, Makefile, ci.yml, specs, or plans"
      - "no Track-1 fingerprint reuse; every verifier identity is independently framed"
      - "no merge, self-approval, or merge-policy decision by the verifier track"
