    owned_surfaces:
      - corpus/**
    acceptance:
      - ">=25 corpus entries harvested from real (AI-generated) code by end of Phase 2"
      - ">=80% recall within each entry's pinned universe budget (build-plan Success criterion 3)"
      - "every entry carries a one-command deterministic repro (vh run --workload ... --seed ... --universe K)"
      - "recall gates for every seeded entry run in scripts/gate.sh with exact exits and anchored verdicts"
    next:
      - "seed the corpus with the five Phase-1 bug classes (lost update, retry double-apply, dirty read, crash-window TOCTOU, fsync-lie hole)"
      - "harvest real vibe-coded bugs from public AI-generated PRs per the playbook"
      - "C6 (convergence 2026-07-22) harvest sprint: admit >=5 new entries harvested from real AI-generated code (public repos, merged AI PRs, agent-framework issue trackers), each modeled as a seeded workload + oracle per corpus/PLAYBOOK.md and corpus/SCHEMA.md, with a pinned one-command repro, an anchored recall gate in scripts/gate.sh, and cited provenance (source repo, PR/commit, defect description); kill (audit R7): <3 admissible real bugs after 4 weeks of sustained harvesting falsifies rig REALISM -> stop exploration investment and propose fidelity fixes"
    non_goals:
      - "no real-code live-fire in this track before Phase 4 (build plan owns that)"
      - "no entry without a pinned recall gate — an unfindable bug is not a corpus entry"
      - "no third active track beyond this portfolio without operator lifecycle authorization"

