              printf '```\n'
            } >> "$GITHUB_STEP_SUMMARY"
          }

          checked_out_sha="$(git rev-parse HEAD)"
          rustc_commit="$(rustc -Vv | awk '$1 == "commit-hash:" { print $2 }')"
          cargo_release="$(cargo -V | awk '{ print $2 }')"
          active_toolchain="$(rustup show active-toolchain | awk '{ print $1 }')"
          environment="environment: source-sha=$checked_out_sha github-sha=$GITHUB_SHA event=$VH_EVENT_NAME repository=$VH_REPOSITORY run-id=$VH_RUN_ID run-attempt=$VH_RUN_ATTEMPT pr-head-sha=$VH_PR_HEAD_SHA pr-base-sha=$VH_PR_BASE_SHA merge-group-head-sha=$VH_MERGE_GROUP_HEAD_SHA merge-group-base-sha=$VH_MERGE_GROUP_BASE_SHA runner-os=$RUNNER_OS runner-arch=$RUNNER_ARCH image-os=${ImageOS:-unknown} image-version=${ImageVersion:-unknown} rustc-release=$VH_EXPECTED_RUSTC_RELEASE rustc-commit=$rustc_commit cargo-release=$cargo_release active-toolchain=$active_toolchain"
          if [[ "$checked_out_sha" != "$GITHUB_SHA" ]] || ! source_is_clean; then
            controlled_error="soak: receipt-schema=vh-verify-soak-v1 verdict=ERROR evidence-grade=D0 error-code=unclean-source"
            persist_evidence "$controlled_error"
            summarize "Tier-1 release replay evidence — ERROR" "$controlled_error"
            exit 1
          fi

          capture_dir="$(mktemp -d "$RUNNER_TEMP/vh-tier1-release-capture.XXXXXXXX")"
          target_dir="$(mktemp -d "$RUNNER_TEMP/vh-tier1-release-target.XXXXXXXX")"
          raw_output="$capture_dir/stdout"
          raw_stderr="$capture_dir/stderr"
          set +e
          env -u GITHUB_ENV -u GITHUB_OUTPUT -u GITHUB_PATH -u GITHUB_STEP_SUMMARY -u GITHUB_TOKEN \
            CARGO_TARGET_DIR="$target_dir" \
            cargo run --quiet --locked --offline --release -p vh-verify --features ci-soak-200 --bin vh-verify \
            2> >(head -c 4097 > "$raw_stderr") | head -c 4097 > "$raw_output"
          pipeline_status=("${PIPESTATUS[@]}")
          wait
