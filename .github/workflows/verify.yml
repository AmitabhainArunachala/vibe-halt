          exit 1
      - name: Persist bounded release-soak evidence
        if: ${{ always() && steps.release_soak.outputs.evidence-path != '' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: vh-tier1-release-${{ github.sha }}-${{ runner.os }}-${{ runner.arch }}-${{ github.run_attempt }}
          path: ${{ steps.release_soak.outputs.evidence-path }}
          if-no-files-found: error
          retention-days: 90
