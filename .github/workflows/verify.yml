          captured_bytes="$(wc -c < "$raw_output")"
          captured_lines="$(wc -l < "$raw_output")"
          stderr_bytes="$(wc -c < "$raw_stderr")"
          captured_bytes="${captured_bytes//[[:space:]]/}"
          captured_lines="${captured_lines//[[:space:]]/}"
          stderr_bytes="${stderr_bytes//[[:space:]]/}"

          if ! source_is_clean || [[ "$(git rev-parse HEAD)" != "$GITHUB_SHA" ]]; then
