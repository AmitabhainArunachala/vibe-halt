name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # rust-toolchain.toml pins the compiler; rustup on the runner honors it.
      - name: Toolchain
        run: rustup show
      - name: Determinism deny-list (gate 0)
        run: |
          python3 scripts/check_determinism_denylist.py --self-test
          python3 scripts/check_determinism_denylist.py
      - name: Format
        run: cargo fmt --all --check
      - name: Clippy (strict)
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Tests
        run: cargo test --workspace
      - name: Doctor — frozen Tier-1 compatibility identity
        run: cargo run -q -p vh-cli -- doctor
      - name: Divergence gate — 200 universes, each run twice, full-observable-compared
        run: cargo run -q -p vh-cli -- run --workload demo --seed 0xD1CE --universes 200
      - name: Seeded-bug gate — exact exit 1 + FINDINGS verdict required
        run: |
          set +e
          out=$(cargo run -q -p vh-cli -- run --workload demo-buggy --seed 0xD1CE --universes 50)
          code=$?
          set -e
          if [ "$code" -ne 1 ] || ! printf '%s' "$out" | grep -q "verdict: FINDINGS"; then
            echo "demo-buggy: expected exit 1 + 'verdict: FINDINGS', got exit $code"; exit 1
          fi
      - name: Detector gate — exact exit 1 + DIVERGENT required
        run: |
          set +e
          out=$(cargo run -q -p vh-cli -- run --workload demo-nondet --seed 0xD1CE --universes 5)
          code=$?
          set -e
          if [ "$code" -ne 1 ] || ! printf '%s' "$out" | grep -q "DIVERGENT universe"; then
            echo "demo-nondet: expected exit 1 + DIVERGENT, got exit $code"; exit 1
          fi
      - name: Zero-work gate — universes 0 rejected with exit 2
        run: |
          set +e
          cargo run -q -p vh-cli -- run --workload demo --universes 0 > /dev/null 2>&1
          code=$?
          set -e
          if [ "$code" -ne 2 ]; then
            echo "--universes 0: expected rejection with exit 2, got exit $code"; exit 1
          fi
