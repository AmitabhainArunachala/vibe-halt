name: ci

# Honest scope (hardening-loop-4 GAP 6): hosted CI is evidence
# infrastructure, not a security boundary. A green run proves the gate
# battery (scripts/gate.sh) exited 0 at this SHA on the runner named
# below — nothing more. It does NOT prove the absence of malicious code:
# PR builds execute contributor-controlled code on shared hosted
# infrastructure. D0 is a claim about the closed simulation boundary
# (DESIGN.md §2), never about CI trust.
on:
  push:
    branches: [main]
  pull_request:
  merge_group:
    types: [checks_requested]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gate:
    # ubuntu-24.04 is an OS-family LABEL, not an immutable image: GitHub
    # updates the image behind it (actions/runner-images). It is pinned
    # relative to ubuntu-latest only; the reproducibility anchors are the
    # rust-toolchain.toml pin and the frozen doctor identity, not the
    # runner image.
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      # actions/checkout v4.2.2, pinned to its immutable commit SHA.
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false
      # rust-toolchain.toml pins the compiler; rustup on the runner honors it.
      - name: Toolchain
        run: rustup show
      # THE gate battery — the same script `make gate` runs locally, so CI
      # and the Makefile cannot drift step-for-step (hardening-loop-4 GAP).
      - name: Gate battery (scripts/gate.sh)
        run: bash scripts/gate.sh
